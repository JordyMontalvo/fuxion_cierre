server {
  listen 80;

  # Frontend estático servido por Nginx.
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy a Go (mantiene las rutas internas /calculate /tree /transaction)
  location /go/ {
    rewrite ^/go/(.*)$ /$1 break;
    proxy_pass http://go:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy a C++
  location /cpp/ {
    rewrite ^/cpp/(.*)$ /$1 break;
    proxy_pass http://cpp:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

